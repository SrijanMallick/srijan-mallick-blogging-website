<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Srijan Mallick | Business Analyst & Product Thinker</title>
  <meta name="description" content="Get in touch with Srijan Mallick for collaborations, opportunities, or inquiries. Connect via LinkedIn, GitHub, or email.">
  <meta name="keywords" content="Business Analyst, Product Analyst, Contact, Data Analytics">
  <meta property="og:title" content="Contact | Srijan Mallick">
  <meta property="og:description" content="Reach out for collaborations, opportunities, or inquiries.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://srijanmallick.com/contact.html">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="site-nav"></div>

  <main>
    <header class="page-header">
      <div class="container">
        <h1>Contact</h1>
        <p class="lead">Interested in collaborating, discussing an opportunity, or sharing feedback? I would love to hear from you.</p>
      </div>
    </header>

    <section class="section">
      <div class="container">
        <div class="contact-layout">
          <form class="contact-form" id="contact-form" novalidate>
            <div>
              <label for="name">Name</label>
              <input type="text" id="name" name="name" required autocomplete="name">
            </div>
            <div>
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required autocomplete="email">
            </div>
            <div>
              <label for="subject">Subject</label>
              <input type="text" id="subject" name="subject" required>
            </div>
            <div>
              <label for="message">Message</label>
              <textarea id="message" name="message" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Send Message</button>
            <p class="form-message" id="form-message" role="status"></p>
          </form>

          <div class="contact-info">
            <h3>Connect With Me</h3>
            <p>I am open to conversations about business analysis, product management, data analytics, and technology strategy.</p>
            <div class="contact-links">
              <a href="https://linkedin.com/in/srijanmallick" target="_blank" rel="noopener noreferrer">LinkedIn →</a>
              <a href="https://github.com/SrijanMallick" target="_blank" rel="noopener noreferrer">GitHub →</a>
              <a href="mailto:srijanmallicknita@gmail.com">srijanmallicknita@gmail.com →</a>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="js/main.js"></script>
</body>
</html>
